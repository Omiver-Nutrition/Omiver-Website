services:
  db:
    image: postgres:16
    container_name: omiver_db
    environment:
      - POSTGRES_DB=${DATABASE_NAME}
      - POSTGRES_USER=${DATABASE_USER}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-U ${DATABASE_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  web:
    build: .
    container_name: omiver_server
    ports:
      - "8001:8000"
    env_file:
      - ./.env
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
      - app_logs:/app/logs
    environment:
      - DATABASE_NAME=${DATABASE_NAME}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_HOST=${DATABASE_HOST}
      - DATABASE_PORT=${DATABASE_PORT}
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  frontend:
    build:
      context: ../omiver-app
      dockerfile: Dockerfile
    container_name: omiver_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - frontend_build:/app/build
      - frontend_cache:/app/.next
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  caddy:
    image: caddy:alpine
    container_name: omiver_caddy
    restart: unless-stopped
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy_data:/data        # Persists certificates and keys
      - ./caddy_config:/config    # Persists autosaved configurations
      - static_files:/srv/static:ro
      - caddy_logs:/var/log/caddy
    depends_on:
      - web
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  backup:
    image: postgres:16
    container_name: omiver_backup
    restart: "no"
    env_file:
      - ./.env
    volumes:
      - postgres_data:/var/lib/postgresql/data:ro
      - postgres_backups:/backups
      - ./backup-scripts:/scripts:ro
    command: /bin/bash -c "sleep infinity"
    depends_on:
      - db
volumes:
  # Database volumes
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/docker-data/postgres_data  # ✅ Explicit path on host

  postgres_backups:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/docker-data/postgres_backups
  # Application volumes
  static_files:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/docker-data/static_files
  media_files:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/docker-data/media_files
  app_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/docker-data/app_logs
  # Frontend volumes
  frontend_build:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/docker-data/frontend_build
  frontend_cache:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/docker-data/frontend_cache
  # Caddy volumes
  caddy_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/docker-data/caddy_data
  caddy_config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/docker-data/caddy_config
  caddy_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/docker-data/caddy_logs